name: Test

# Unit-tests the shipped GraalJS scripts (percy/scripts/*.js) via a node:vm
# harness that emulates the Maestro host, and enforces 100% line coverage.
# The production scripts are NOT modified — the harness executes them in place
# from their real file paths so V8/c8 attribute coverage to the actual source.
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      branch:
        description: Which branch of @percy/cli to build from source for this run
        required: false
        default: master

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      - uses: actions-ecosystem/action-regex-match@v2
        id: regex-match
        if: ${{ github.event_name == 'workflow_dispatch' }}
        with:
          text: ${{ github.event.inputs.branch }}
          regex: '^[a-zA-Z0-9_/\-]+$'
      - name: Break on invalid branch name
        if: ${{ github.event_name == 'workflow_dispatch' && steps.regex-match.outputs && steps.regex-match.outputs.match == '' }}
        run: exit 1
      - name: Set up @percy/cli from git
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          BRANCH: ${{ github.event.inputs.branch }}
          WORKSPACE: ${{ github.workspace }}
        run: |
          cd /tmp
          git clone --branch "$BRANCH" --depth 1 https://github.com/percy/cli
          cd cli
          PERCY_PACKAGES=`find packages -mindepth 1 -maxdepth 1 -type d | sed -e 's/packages/@percy/g' | tr '\n' ' '`
          yarn
          yarn build
          yarn global:link
          cd "$WORKSPACE"
          yarn link $PERCY_PACKAGES >/dev/null 2>&1 || true
          echo "$(yarn global bin)" >> "$GITHUB_PATH"
          export PATH="$(yarn global bin):$PATH"
          percy --version
      - name: Run unit tests
        run: npm test
      - name: Run coverage (100% line gate)
        run: npm run coverage
